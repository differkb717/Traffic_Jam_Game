<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Jam 遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ── 全局 ─────────────────────────────────────────── */
        body { font-family: 'Inter', sans-serif; touch-action: none; }

        /* ── 棋盤 ─────────────────────────────────────────── */
        .game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            width: 90vw;    max-width: 420px;
            height: 90vw;   max-height: 420px;
            border: 5px solid #333;
            position: relative;
            background-color: #f0f0f0;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin: 0 auto;
            background-image:
                linear-gradient(to right, #ccc 1px, transparent 1px),
                linear-gradient(to bottom, #ccc 1px, transparent 1px);
            background-size: calc(100% / 6) calc(100% / 6);
            z-index: 1;
            touch-action: none;
        }

        /* ── 出口 ─────────────────────────────────────────── */
        .exit-area {
            position: absolute;
            background-color: rgba(0, 255, 0, 0.3);
            z-index: 0;
        }
        .exit-area::after {
            content: '→';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5em;
            color: #333;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.7);
        }
        .exit-border-filler {
            position: absolute;
            right: -5px;
            width: 5px;
            background-color: #f0f0f0;
            z-index: 2;
        }

        /* ── 車輛 ─────────────────────────────────────────── */
        .vehicle {
            position: absolute;
            box-sizing: border-box;
            border: 1px solid #000;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 1px #555;
            cursor: grab;
            user-select: none;
            transition: left 0.18s ease-out, top 0.18s ease-out;
            z-index: 10;
            touch-action: none;           /* 防止手機預設觸控行為干擾拖曳 */
            will-change: left, top;       /* 優化動畫性能 */
        }
        .vehicle.dragging {
            cursor: grabbing;
            z-index: 11;
            opacity: 0.8;
            transition: none; /* 拖曳中不要有 transition，避免延遲感 */
        }
        /* 解答播放中的車輛有動畫效果 */
        .vehicle.animating {
            transition: left 0.3s ease-in-out, top 0.3s ease-in-out;
        }

        /* ── 車輛顏色（以字母 ID 對應） ───────────────────── */
        /* 注意：O/P/Q/R 用於 truck，顏色與 B/E/C/F 刻意不同以便區分 */
        .color-X { background-color: #FF0000; color: #fff; text-shadow: none; }
        .color-A { background-color: #32CD32; color: #333; text-shadow: none; }
        .color-B { background-color: #FFD700; color: #333; text-shadow: none; }
        .color-C { background-color: #1E90FF; color: #333; text-shadow: none; }
        .color-D { background-color: #FFB6C1; color: #333; text-shadow: none; }
        .color-E { background-color: #9932CC; color: #eee; text-shadow: none; }
        .color-F { background-color: #228B22; color: #eee; text-shadow: none; }
        .color-G { background-color: #778899; color: #333; text-shadow: none; }
        .color-H { background-color: #F5F5DC; color: #333; text-shadow: none; }
        .color-I { background-color: #FFFF00; color: #333; text-shadow: none; }
        .color-J { background-color: #8B4513; color: #eee; text-shadow: none; }
        .color-K { background-color: #808000; color: #eee; text-shadow: none; }
        .color-O { background-color: #FF8C00; color: #333; text-shadow: none; }
        .color-P { background-color: #6A0DAD; color: #eee; text-shadow: none; }
        .color-Q { background-color: #0055CC; color: #eee; text-shadow: none; }
        .color-R { background-color: #006400; color: #eee; text-shadow: none; }

        /* ── Modal ────────────────────────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s ease-in-out;
        }
        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background-color: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            position: relative;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease-in-out;
        }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .modal-close-button {
            position: absolute; top: 10px; right: 10px;
            background: none; border: none;
            font-size: 1.5rem; cursor: pointer; color: #333;
            padding: 5px; border-radius: 50%;
            transition: background-color 0.2s;
        }
        .modal-close-button:hover { background-color: #eee; }

        /* ── 訊息框 ───────────────────────────────────────── */
        .message-box { min-height: 30px; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

        </div>
    </div>

    <div id="game-board" class="game-board"></div>

    <!-- ── 按鈕列 ───────────────────────────────────── -->
    <div class="mt-6 flex justify-center flex-wrap gap-3">
        <button id="reset-button"

        <button id="next-level-button"

            遊戲說明
        </button>
    </div>

    <!-- ── 訊息列 ───────────────────────────────────── -->
    <div id="win-message" class="mt-4 p-3 text-center text-xl font-semibold message-box"></div>

    <!-- ── Modal：遊戲說明 ──────────────────────────── -->
    <div id="instructions-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-button" id="close-instructions-button">&times;</button>
            <h2 class="text-2xl font-bold mb-4 text-gray-800">遊戲說明</h2>
            <ul class="list-disc list-inside text-gray-700 text-base space-y-1">
                <li>目標：移動紅色車 X 到右側開孔的出口。</li>
                <li>玩法：拖曳車輛上下或左右移動它們。</li>
                <li>點「顯示解答」可觀看自動示範。</li>
            </ul>
        </div>
    </div>

    <!-- ── Modal：過關 ──────────────────────────────── -->
    <div id="win-message-modal" class="modal-overlay">
        <div class="modal-content text-center p-6">
            <h2 id="win-modal-title" class="text-2xl font-bold mb-4 text-green-700">恭喜！</h2>

                    確定

            </div>
        </div>

// ════════════════════════════════════════════════════════════════
//  § 4  遊戲執行狀態
// ════════════════════════════════════════════════════════════════
let CELL_SIZE_PX      = 0;
let currentLevelIndex = 0;
let vehicles          = [];   // 當前關卡所有車輛的執行時資料
let boardState        = [];   // 6×6 陣列，儲存每格被哪輛車佔用（null 或車輛 id）

// ── 拖曳狀態 ──────────────────────────────────────────────────
let dragState = null;
// dragState 結構：{ vehicleEl, vehicleData, offsetX, offsetY, bounds }
// bounds 結構：{ minX, maxX, minY, maxY }（像素）

// ── 解答播放狀態 ──────────────────────────────────────────────
let isPlayingSolution  = false;
let currentPlaybackToken = 0; // 每次新播放遞增；舊 async loop 比對失效後自動放棄

// ════════════════════════════════════════════════════════════════
//  § 5  工具函式
// ════════════════════════════════════════════════════════════════

/** 重新計算單格像素尺寸（響應式） */
function calculateCellSize() {
    CELL_SIZE_PX = gameBoard.clientWidth / GRID_SIZE;
}

/** 判斷是否為手機寬度 */
function isMobile() {
    return window.innerWidth < 768;
}

/** 將車輛 data 的所有格子寫入（或清除）boardState */
function updateBoardState(vehicleData, valueToSet) {
    for (let i = 0; i < vehicleData.length; i++) {
        const r = vehicleData.orientation === 'horizontal' ? vehicleData.row : vehicleData.row + i;
        const c = vehicleData.orientation === 'horizontal' ? vehicleData.col + i : vehicleData.col;
        if (r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE) {
            boardState[r][c] = valueToSet;
        }
    }
}

/** 檢查車輛是否可移動到 (targetRow, targetCol) */
function canMoveTo(vehicleData, targetRow, targetCol) {
    if (vehicleData.orientation === 'horizontal') {
        if (targetCol < 0 || targetCol + vehicleData.length > GRID_SIZE) return false;
    } else {
        if (targetRow < 0 || targetRow + vehicleData.length > GRID_SIZE) return false;
    }
    for (let i = 0; i < vehicleData.length; i++) {
        const r = vehicleData.orientation === 'horizontal' ? targetRow       : targetRow + i;
        const c = vehicleData.orientation === 'horizontal' ? targetCol + i   : targetCol;
        if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) continue;
        if (boardState[r][c] !== null && boardState[r][c] !== vehicleData.id) return false;
    }
    return true;
}

/** 套用車輛的像素尺寸與位置到 DOM 元素 */
function applyVehicleStyle(el, vehicleData) {
    if (vehicleData.orientation === 'horizontal') {
        el.style.width  = vehicleData.length * CELL_SIZE_PX + 'px';
        el.style.height = CELL_SIZE_PX + 'px';
    } else {
        el.style.width  = CELL_SIZE_PX + 'px';
        el.style.height = vehicleData.length * CELL_SIZE_PX + 'px';
    }
    el.style.left = vehicleData.col * CELL_SIZE_PX + 'px';
    el.style.top  = vehicleData.row * CELL_SIZE_PX + 'px';
}

/** 更新出口標示的位置（供 setupLevel 與 handleResize 共用） */
function positionExitElements() {
    const levelData  = gameLevels[currentLevelIndex];
    const exitArea   = gameBoard.querySelector('.exit-area');
    const filler     = gameBoard.querySelector('.exit-border-filler');
    if (exitArea) {
        exitArea.style.height = CELL_SIZE_PX + 'px';
        exitArea.style.top    = levelData.exitRow * CELL_SIZE_PX + 'px';
        exitArea.style.left   = (GRID_SIZE - 1) * CELL_SIZE_PX + 'px';
        exitArea.style.width  = CELL_SIZE_PX + 'px';
    }
    if (filler) {
        filler.style.top    = levelData.exitRow * CELL_SIZE_PX + 'px';
        filler.style.height = CELL_SIZE_PX + 'px';
    }
}

// ════════════════════════════════════════════════════════════════
//  § 6  播放控制
// ════════════════════════════════════════════════════════════════

/** 立即中止任何進行中的解答播放，並清理拖曳殘留 */
function stopSolutionPlayback() {
    currentPlaybackToken++; // 讓舊 async loop 在下一個 await 點自行放棄
    isPlayingSolution = false;
// 強制清除所有車輛的動畫 class 和 transition
    gameBoard.querySelectorAll('.vehicle').forEach(el => {
        el.classList.remove('animating', 'dragging');
        el.style.transition = 'none';           // 暫時關閉 transition
        void el.offsetWidth;                    // 強制重排（reflow）讓樣式立即生效
        el.style.transition = '';               // 恢復原本 transition
    });
    _cleanupDrag();
    setUILocked(false);
    setDraggingEnabled(true);
}

/** 鎖定／解鎖 UI 按鈕（解答播放中防誤觸） */
function setUILocked(locked) {
    const lockTargets = [resetButton, showSolutionButton];
    const disableTargets = [difficultySelect, specificLevelSelect, nextLevelButton];
    lockTargets.forEach(el => {
        el.disabled = locked;
        el.classList.toggle('opacity-50', locked);
        el.classList.toggle('cursor-not-allowed', locked);
    });
    disableTargets.forEach(el => { el.disabled = locked; });
}

/** 禁用所有車輛的滑鼠/觸控事件（解答播放中） */
function setDraggingEnabled(enabled) {
    gameBoard.querySelectorAll('.vehicle').forEach(v => {
        v.style.pointerEvents = enabled ? 'auto' : 'none';
    });
}

// ════════════════════════════════════════════════════════════════
//  § 7  關卡設置
// ════════════════════════════════════════════════════════════════

function setupLevel(levelIdx) {
    // 確保任何舊的播放都立即失效（token 遞增）
    stopSolutionPlayback();
    setUILocked(false);
    winMessageModal.classList.remove('show');

    if (levelIdx < 0 || levelIdx >= gameLevels.length) {
        console.error('Invalid level index:', levelIdx);
        gameBoard.innerHTML = '';
        winMessage.textContent = '錯誤：無效的關卡索引。';
        nextLevelButton.classList.add('hidden');
        return;
    }

    currentLevelIndex = levelIdx;
    const levelData = gameLevels[currentLevelIndex];

    // 同步下拉選單
    syncDropdownsToLevel(currentLevelIndex);

    // 重置訊息
    winMessage.textContent = '';
    winMessage.classList.remove('bg-green-200', 'text-green-700', 'p-3');
    nextLevelButton.classList.add('hidden');

    // 清空棋盤、重置 boardState
    gameBoard.innerHTML = '';
    boardState = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));

    // 建立出口標示
    const exitArea = document.createElement('div');
    exitArea.className = 'exit-area';
    gameBoard.appendChild(exitArea);

    const filler = document.createElement('div');
    filler.className = 'exit-border-filler';
    gameBoard.appendChild(filler);

    positionExitElements();

    // 深拷貝車輛資料並建立 DOM
    vehicles = JSON.parse(JSON.stringify(levelData.vehicles));
    vehicles.forEach(vData => {
        const el = document.createElement('div');
        el.id = `vehicle-${vData.id}`;
        el.className = `vehicle ${vData.type} color-${vData.colorName}`;
        el.textContent = vData.id;
        applyVehicleStyle(el, vData);
        el.vehicleData = vData; // 直接掛在 DOM 上，方便事件處理器取用
        updateBoardState(vData, vData.id);// 占領格子
        // 綁定拖曳事件
        el.addEventListener('mousedown', onDragStart);
        el.addEventListener('touchstart', onDragStart, { passive: false });

        gameBoard.appendChild(el);
    });    
}

// ════════════════════════════════════════════════════════════════
//  § 8  拖曳邏輯
// ════════════════════════════════════════════════════════════════

function _cleanupDrag() {
    if (!dragState) return;
    dragState.vehicleEl.classList.remove('dragging');
    dragState = null;
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup',   onDragEnd);
    document.removeEventListener('touchmove', onDragMove);
    document.removeEventListener('touchend',  onDragEnd);
}

function onDragStart(e) {
    if (dragState || isPlayingSolution) return;
    e.preventDefault();

    const vehicleEl   = e.currentTarget;
    const vehicleData = vehicleEl.vehicleData;

    // 計算本次拖曳的移動上下限（先把自己從 boardState 移除）
    updateBoardState(vehicleData, null);
    let minCol = vehicleData.col, maxCol = vehicleData.col;
    let minRow = vehicleData.row, maxRow = vehicleData.row;
    if (vehicleData.orientation === 'horizontal') {
        while (minCol > 0 && canMoveTo(vehicleData, vehicleData.row, minCol - 1)) minCol--;
        while (maxCol + vehicleData.length < GRID_SIZE && canMoveTo(vehicleData, vehicleData.row, maxCol + 1)) maxCol++;
    } else {
        while (minRow > 0 && canMoveTo(vehicleData, minRow - 1, vehicleData.col)) minRow--;
        while (maxRow + vehicleData.length < GRID_SIZE && canMoveTo(vehicleData, maxRow + 1, vehicleData.col)) maxRow++;
    }

    const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
    const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
    const rect    = vehicleEl.getBoundingClientRect();

    dragState = {
        vehicleEl,
        vehicleData,
        offsetX: clientX - rect.left,
        offsetY: clientY - rect.top,
        bounds: {
            minX: minCol * CELL_SIZE_PX, maxX: maxCol * CELL_SIZE_PX,
            minY: minRow * CELL_SIZE_PX, maxY: maxRow * CELL_SIZE_PX,
        },
    };
    vehicleEl.classList.add('dragging');

    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup',   onDragEnd);
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('touchend',  onDragEnd);
}

function onDragMove(e) {
    if (!dragState) return;
    e.preventDefault();

    const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
    const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
    const boardRect = gameBoard.getBoundingClientRect();
    const { vehicleEl, vehicleData, offsetX, offsetY, bounds } = dragState;

    const rawX = clientX - boardRect.left - offsetX;
    const rawY = clientY - boardRect.top  - offsetY;

    if (vehicleData.orientation === 'horizontal') {
        vehicleEl.style.left = Math.max(bounds.minX, Math.min(rawX, bounds.maxX)) + 'px';
    } else {
        vehicleEl.style.top  = Math.max(bounds.minY, Math.min(rawY, bounds.maxY)) + 'px';
    }
}

function onDragEnd() {
    if (!dragState) return;

    const { vehicleEl, vehicleData } = dragState;

    // 吸附到最近格線
    const finalCol = Math.round(parseFloat(vehicleEl.style.left) / CELL_SIZE_PX);
    const finalRow = Math.round(parseFloat(vehicleEl.style.top)  / CELL_SIZE_PX);
    vehicleData.col = finalCol;
    vehicleData.row = finalRow;
    vehicleEl.style.left = finalCol * CELL_SIZE_PX + 'px';
    vehicleEl.style.top  = finalRow * CELL_SIZE_PX + 'px';

    updateBoardState(vehicleData, vehicleData.id);
    _cleanupDrag();
    checkWinCondition();
}

// ════════════════════════════════════════════════════════════════
//  § 9  勝利判斷
// ════════════════════════════════════════════════════════════════

function checkWinCondition() {
    const player    = vehicles.find(v => v.isPlayer);
    const levelData = gameLevels[currentLevelIndex];
    if (!player || player.orientation !== 'horizontal') return;
    if (player.row !== levelData.exitRow) return;
    if (player.col + player.length !== GRID_SIZE) return;

    const hasNext = currentLevelIndex < gameLevels.length - 1;

    if (isMobile()) {
        winModalText.textContent = hasNext ? '你贏了！' : '你贏了！已完成所有關卡！';
        winModalNextLevelButton.classList.toggle('hidden', !hasNext);
        winMessageModal.classList.add('show');
    } else {
        winMessage.textContent = hasNext ? '恭喜！你贏了！' : '恭喜！你贏了！已完成所有關卡！';
        winMessage.classList.add('bg-green-200', 'text-green-700', 'p-3');
        if (hasNext) nextLevelButton.classList.remove('hidden');
    }
}

// ════════════════════════════════════════════════════════════════
//  § 10  解答播放
// ════════════════════════════════════════════════════════════════

async function playSolution() {
    if (isPlayingSolution) return;
    const level = gameLevels[currentLevelIndex];
    if (!level.solutionSteps?.length) { alert('此關尚無解答'); return; }

    // 重置關卡（stopSolutionPlayback 已包含在 setupLevel 裡）
    setupLevel(currentLevelIndex);
    const myToken = currentPlaybackToken; // 取得本次播放的唯一 token

    isPlayingSolution = true;
    setUILocked(true);
    setDraggingEnabled(false);

    for (const step of level.solutionSteps) {
        if (currentPlaybackToken !== myToken) break;
        await applySolutionStep(step, myToken);
        if (currentPlaybackToken !== myToken) break;
        await sleep(STEP_DELAY_MS);
    }

    // 只有本次播放仍有效才恢復 UI
    if (currentPlaybackToken === myToken) {
        setDraggingEnabled(true);
        isPlayingSolution = false;
        setUILocked(false);
    }
}

/** 執行單一解答步驟（含 token 安全檢查） */
async function applySolutionStep(step, token) {
    if (currentPlaybackToken !== token) return;

    const vehicle    = vehicles.find(v => v.id === step.id);
    const vehicleEl  = $(`vehicle-${step.id}`);
    if (!vehicle || !vehicleEl || !gameBoard.contains(vehicleEl)) return;

    // 每次移動前清除動畫 class，避免累積
    vehicleEl.classList.remove('animating');
    void vehicleEl.offsetWidth;   // 強制 reflow

    const { direction, steps } = step;
    let newRow = vehicle.row;
    let newCol = vehicle.col;
    if (direction === 'left')  newCol -= steps;
    if (direction === 'right') newCol += steps;
    if (direction === 'up')    newRow -= steps;
    if (direction === 'down')  newRow += steps;

    updateBoardState(vehicle, null);

    if (vehicle.orientation === 'horizontal') {
        vehicle.col = Math.max(0, Math.min(newCol, GRID_SIZE - vehicle.length));
        vehicleEl.classList.add('animating');
        vehicleEl.style.left = vehicle.col * CELL_SIZE_PX + 'px';
    } else {
        vehicle.row = Math.max(0, Math.min(newRow, GRID_SIZE - vehicle.length));
        vehicleEl.classList.add('animating');
        vehicleEl.style.top = vehicle.row * CELL_SIZE_PX + 'px';
    }

    updateBoardState(vehicle, vehicle.id);
}

/** Promise 包裝的 setTimeout */
function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// ════════════════════════════════════════════════════════════════
//  § 11  下拉選單管理
// ════════════════════════════════════════════════════════════════

function populateDifficultySelect() {
    difficultySelect.innerHTML = '';
    for (const [key, diff] of Object.entries(difficulties)) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = diff.name;
        difficultySelect.appendChild(opt);
    }
}

function populateSpecificLevelSelect(difficultyKey, preferredLevelNum = null) {
    const diff = difficulties[difficultyKey];
    specificLevelSelect.innerHTML = '';
    if (!diff) {
        specificLevelSelect.innerHTML = '<option value="">--</option>';
        return;
    }

    let firstAvailable = null;
    for (let num = diff.startLevel; num <= diff.endLevel; num++) {
        if (!gameLevels.find(lvl => lvl.levelNumber === num)) continue;
        if (firstAvailable === null) firstAvailable = num;
        const opt = document.createElement('option');
        opt.value = num;
        opt.textContent = `關卡 ${num}`;
        specificLevelSelect.appendChild(opt);
    }

    const target = preferredLevelNum ?? firstAvailable;
    if (target && specificLevelSelect.querySelector(`option[value="${target}"]`)) {
        specificLevelSelect.value = target;
    } else if (!firstAvailable) {
        specificLevelSelect.innerHTML = '<option value="">無關卡</option>';
    }
}

/** 根據目前關卡 index 同步兩個下拉選單的選中狀態 */
function syncDropdownsToLevel(levelIdx) {
    const levelData = gameLevels[levelIdx];
    if (!levelData) return;
    const num = levelData.levelNumber;

    const diffKey = Object.keys(difficulties).find(k =>
        num >= difficulties[k].startLevel && num <= difficulties[k].endLevel
    );
    if (!diffKey) return;

    if (difficultySelect.value !== diffKey) {
        difficultySelect.value = diffKey;
        populateSpecificLevelSelect(diffKey, num);
    } else if (specificLevelSelect.querySelector(`option[value="${num}"]`)) {
        specificLevelSelect.value = num;
    } else {
        populateSpecificLevelSelect(diffKey, num);
    }
}

// ════════════════════════════════════════════════════════════════
//  § 12  視窗縮放
// ════════════════════════════════════════════════════════════════

function handleResize() {
    calculateCellSize();
    vehicles.forEach(vData => {
        const el = $(`vehicle-${vData.id}`);
        if (el) applyVehicleStyle(el, vData);
    });
    positionExitElements();
}

// ════════════════════════════════════════════════════════════════
//  § 13  事件綁定
// ════════════════════════════════════════════════════════════════

// 按鈕
resetButton.addEventListener('click', () => setupLevel(currentLevelIndex));

nextLevelButton.addEventListener('click', () => {
    if (currentLevelIndex < gameLevels.length - 1) setupLevel(currentLevelIndex + 1);
});

showSolutionButton.addEventListener('click', playSolution);

// 下拉選單
difficultySelect.addEventListener('change', e => {
    stopSolutionPlayback();
    setUILocked(false);
    const key = e.target.value;
    populateSpecificLevelSelect(key);
    const levelNum = parseInt(specificLevelSelect.value);
    const idx = gameLevels.findIndex(l => l.levelNumber === levelNum);
    if (idx !== -1) {
        setupLevel(idx);
    } else {
        gameBoard.innerHTML = '<p class="text-center p-4">此難易度尚無關卡。</p>';
        winMessage.textContent = '';
        nextLevelButton.classList.add('hidden');
    }
});

specificLevelSelect.addEventListener('change', e => {
    stopSolutionPlayback();
    setUILocked(false);
    const idx = gameLevels.findIndex(l => l.levelNumber === parseInt(e.target.value));
    if (idx !== -1) setupLevel(idx);
});

// Modal
showInstructionsButton.addEventListener('click', () => instructionsModal.classList.add('show'));
closeInstructionsButton.addEventListener('click', () => instructionsModal.classList.remove('show'));
instructionsModal.addEventListener('click', e => {
    if (e.target === instructionsModal) instructionsModal.classList.remove('show');
});

winModalCloseButton.addEventListener('click', () => winMessageModal.classList.remove('show'));
winModalNextLevelButton.addEventListener('click', () => {
    winMessageModal.classList.remove('show');
    if (currentLevelIndex < gameLevels.length - 1) setupLevel(currentLevelIndex + 1);
});

window.addEventListener('resize', handleResize);

// ════════════════════════════════════════════════════════════════
//  § 14  初始化
// ════════════════════════════════════════════════════════════════

(function init() {
    if (!gameLevels.length) {
        gameBoard.innerHTML = '<p class="text-center p-4">沒有定義任何關卡。</p>';
        winMessage.textContent = '請先定義遊戲關卡。';
        difficultySelect.innerHTML = '<option>無難易度</option>';
        specificLevelSelect.innerHTML = '<option>無關卡</option>';
        [difficultySelect, specificLevelSelect].forEach(el => el.disabled = true);
        return;
    }

    calculateCellSize();
    populateDifficultySelect();

    const firstDiffKey = Object.keys(difficulties)[0];
    difficultySelect.value = firstDiffKey;
    populateSpecificLevelSelect(firstDiffKey, difficulties[firstDiffKey].startLevel);

    const initLevelNum = parseInt(specificLevelSelect.value);
    const initIdx = gameLevels.findIndex(l => l.levelNumber === initLevelNum);
    setupLevel(initIdx !== -1 ? initIdx : 0);
})();

</script>
